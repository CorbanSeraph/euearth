<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>EuEarth Bender Phase-1 Window</title>
    <style>
        html, body {
            overflow: hidden;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #06070b;
            color: #e8eef8;
            font-family: -apple-system, sans-serif;
        }
        #renderCanvas {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(6, 7, 11, 0.8);
            border: 1px solid rgba(65, 227, 210, 0.35);
            padding: 15px;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="ui">
        <h2>Bender Window</h2>
        <p>Live authoritative projection. Visual watch only.</p>
    </div>
    <canvas id="renderCanvas"></canvas>
    
    <script src="/static/babylon.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
