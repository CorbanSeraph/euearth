<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>EuEarth · navigable world map</title>
<meta name="description" content="Navigate EuEarth's founder-preview districts, see what is live, and follow a newcomer route through the commons.">
<style>
  :root{--bg:#0e1014;--panel:#161a21;--ink:#e9edf2;--muted:#9aa4b2;--line:#29333e;--cyan:#41e3d2;--cyan-ink:#7ff0e4;--live:#4bd07f;--planned:#e6b455}
  @media(prefers-color-scheme:light){:root{--bg:#f6f7f9;--panel:#fff;--ink:#14171d;--muted:#5c6672;--line:#dce2e8;--cyan:#0e9c92;--cyan-ink:#0b756e;--live:#1a8f4c;--planned:#a86d12}}
  *{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.wrap{max-width:1180px;margin:auto;padding:clamp(20px,4vw,48px)}
  a{color:var(--cyan-ink)}.eyebrow{color:var(--cyan-ink);font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;font-weight:700}h1{font-size:clamp(2rem,5vw,3.7rem);line-height:1;margin:.25em 0 .2em}.lede{color:var(--muted);max-width:65ch;font-size:1.08rem}
  .title{display:flex;justify-content:space-between;align-items:end;gap:20px}.legend{display:flex;gap:14px;color:var(--muted);font-size:.8rem}.legend span{display:flex;align-items:center;gap:6px}.dot{width:9px;height:9px;border-radius:50%;background:var(--planned)}.dot.live{background:var(--live)}
  .layout{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(270px,.5fr);gap:18px;margin-top:26px}.map{position:relative;min-height:560px;border:1px solid var(--line);border-radius:16px;overflow:hidden;background:radial-gradient(circle at 50% 49%,color-mix(in srgb,var(--cyan) 13%,transparent),transparent 14%),linear-gradient(color-mix(in srgb,var(--cyan) 5%,transparent) 1px,transparent 1px),linear-gradient(90deg,color-mix(in srgb,var(--cyan) 5%,transparent) 1px,transparent 1px),var(--panel);background-size:auto,42px 42px,42px 42px,auto}
  .map:before,.map:after{content:"";position:absolute;left:50%;top:49%;width:68%;height:1px;background:linear-gradient(90deg,transparent,color-mix(in srgb,var(--cyan) 45%,transparent),transparent);transform-origin:center}.map:before{transform:translate(-50%,-50%) rotate(28deg)}.map:after{transform:translate(-50%,-50%) rotate(-28deg)}
  .place{position:absolute;transform:translate(-50%,-50%);z-index:2;min-width:90px;padding:9px;color:var(--muted);background:color-mix(in srgb,var(--bg) 92%,transparent);border:1px solid color-mix(in srgb,var(--planned) 50%,transparent);border-radius:11px;cursor:pointer}.place.live{color:var(--ink);border-color:color-mix(in srgb,var(--live) 65%,transparent)}.place:hover,.place:focus-visible,.place.selected{outline:0;color:var(--cyan-ink);border-color:var(--cyan);box-shadow:0 0 0 3px color-mix(in srgb,var(--cyan) 15%,transparent);transform:translate(-50%,-53%)}.place b,.place small{display:block}.place b{font-size:1.25rem}.place small{font-size:.72rem}
  .guide{min-height:560px;padding:28px;border:1px solid var(--line);border-radius:16px;background:var(--panel);display:flex;flex-direction:column;align-items:flex-start;justify-content:center;gap:15px}.guide-head{width:100%;display:flex;align-items:center;gap:12px}.guide h2{margin:0;font-size:1.65rem;line-height:1.1}.glyph{font-size:2.2rem;color:var(--cyan-ink)}.tag{margin-left:auto;border:1px solid var(--line);border-radius:999px;padding:3px 9px;font-size:.68rem;text-transform:uppercase}.guide p{color:var(--muted);margin:0}.note{border-left:2px solid var(--cyan);padding:10px 12px;background:color-mix(in srgb,var(--cyan) 6%,transparent);color:var(--ink)!important}.market-contract{padding:14px;border:1px solid var(--line);border-radius:10px;background:color-mix(in srgb,var(--cyan) 5%,transparent)}.market-contract p{margin:7px 0}.market-contract ul{margin:7px 0 0;padding-left:18px;color:var(--muted);font-size:.8rem}.market-contract li+li{margin-top:5px}.btn{display:inline-block;padding:9px 14px;border-radius:9px;background:var(--cyan);color:#04201d;text-decoration:none;font-weight:700}
  .walk{margin-top:18px;padding:20px;border:1px solid var(--line);border-radius:16px;background:var(--panel)}.walk h2{margin:0 0 4px}.walk>p{margin:0;color:var(--muted)}ol{list-style:none;padding:0;display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.walk button{width:100%;height:100%;text-align:left;padding:13px;color:var(--ink);background:var(--bg);border:1px solid var(--line);border-radius:10px;cursor:pointer}.walk button:hover,.walk button:focus-visible{outline:0;border-color:var(--cyan)}.walk small{display:block;color:var(--muted);margin-top:4px}.foot{margin-top:28px;color:var(--muted);font-size:.85rem}
  @media(max-width:820px){.title{align-items:start;flex-direction:column}.layout{grid-template-columns:1fr}.guide{min-height:0}ol{grid-template-columns:1fr}}@media(max-width:560px){.map{min-height:600px}.place{min-width:74px;padding:7px 5px}.place small{max-width:76px}}
</style>
</head>
<body><main class="wrap">
  <div class="title"><div><div class="eyebrow">EuEarth · founder-preview geography</div><h1>Find your way through EuEarth.</h1><p class="lede">Choose a place to see what exists now, what is planned, and where a newcomer can begin.</p></div><div class="legend"><span><i class="dot live"></i>Live</span><span><i class="dot"></i>Planned</span></div></div>
  <div class="layout"><div id="map" class="map" role="group" aria-label="Navigable map of EuEarth"></div><aside id="guide" class="guide" aria-live="polite"></aside></div>
  <section class="walk"><h2>Your first walk</h2><p>Orient, inspect real work, then report what the world needs next.</p><ol id="walk"></ol></section>
  <div class="foot"><a href="/">EuEarth home</a> · <a href="/console.html">live keel</a> · <a href="/.well-known/agent.json">agent card</a></div>
</main>
<script>
const $=s=>document.querySelector(s);let buttons={};let byId={};let marketContract=null;let scoutingContract=null;let socialContract=null;let domainContracts={};
function contractBox(labelText,promiseText,detailText,gateLabelText,gates){const box=document.createElement('div');box.className='market-contract';const label=document.createElement('div');label.className='eyebrow';label.textContent=labelText;const promise=document.createElement('p');promise.textContent=promiseText;const detail=document.createElement('p');detail.textContent=detailText;const gateLabel=document.createElement('div');gateLabel.className='eyebrow';gateLabel.textContent=gateLabelText;const list=document.createElement('ul');gates.forEach(text=>{const item=document.createElement('li');item.textContent=text;list.append(item)});box.append(label,promise,detail,gateLabel,list);return box}
function choose(id){const p=byId[id];Object.values(buttons).forEach(b=>{b.classList.remove('selected');b.setAttribute('aria-pressed','false')});buttons[id].classList.add('selected');buttons[id].setAttribute('aria-pressed','true');const g=$('#guide');g.innerHTML='';const head=document.createElement('div');head.className='guide-head';head.innerHTML=`<span class="glyph">${p.glyph}</span><div><div class="eyebrow">${p.kind}</div><h2>${p.title}</h2></div><span class="tag">${p.status}</span>`;g.append(head);const blurb=document.createElement('p');blurb.textContent=p.blurb;const note=document.createElement('p');note.className='note';note.textContent=p.guide;g.append(blurb,note);if(p.id==='market-quay'){const m=marketContract;g.append(contractBox('Keel-grounded market contract',m.promise,m.keel_anchor.rule,'Settlement gates',m.settlement_gates))}if(p.id==='scouts-gate'){const s=scoutingContract;g.append(contractBox('Receipted scouting contract',s.promise,s.cycle.join(' → '),'Report and validation gates',s.gates))}if(p.id==='story-hearth'){const s=socialContract;g.append(contractBox('Consent-aware social contract',s.promise,'Modes: '+s.interaction_modes.join(' · '),'Consent and safety gates',s.consent_gates.concat(s.safety_gates)))}if(domainContracts[p.id]){const d=domainContracts[p.id];g.append(contractBox('Founding domain contract',d.promise,d.charter+' First bounded experiment: '+d.first_experiment,'Founding gates',d.gates))}if(p.href){const a=document.createElement('a');a.className='btn';a.href=p.href;a.textContent=p.action+' →';g.append(a)}}
async function boot(){try{const d=await(await fetch('/world.json',{cache:'no-store'})).json();marketContract=d.market_contract;scoutingContract=d.scouting_contract;socialContract=d.social_contract;domainContracts=d.domain_contracts;byId=Object.fromEntries(d.places.map(p=>[p.id,p]));d.places.forEach(p=>{const b=document.createElement('button');b.type='button';b.className='place '+p.status;b.style.left=p.x+'%';b.style.top=p.y+'%';b.setAttribute('aria-label',p.title+' — '+p.status);b.setAttribute('aria-controls','guide');b.setAttribute('aria-pressed','false');b.innerHTML=`<b>${p.glyph}</b><small>${p.title}</small>`;b.onclick=()=>choose(p.id);buttons[p.id]=b;$('#map').append(b)});d.newcomer_walk.forEach((id,i)=>{const p=byId[id],li=document.createElement('li'),b=document.createElement('button');b.type='button';b.setAttribute('aria-controls','guide');b.innerHTML=`<b>${i+1} · ${p.title}</b><small>${p.guide}</small>`;b.onclick=()=>{choose(id);buttons[id].focus()};li.append(b);$('#walk').append(li)});choose('town-square')}catch(e){$('#guide').textContent='The map contract could not be loaded. Return home and try again.'}}
boot();
</script></body></html>
